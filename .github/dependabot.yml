version: 2

multi-ecosystem-groups:
  infrastructure:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"

updates:
  - package-ecosystem: "docker"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infrastructure"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
