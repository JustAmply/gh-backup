name: docker-image

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - "scripts/**"
      - "tests/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - "scripts/**"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ github.ref_type == 'tag' && 'true' || steps.filter.outputs.image }}
      shell: ${{ github.ref_type == 'tag' && 'true' || steps.filter.outputs.shell }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            image:
              - '.dockerignore'
              - 'Dockerfile'
              - 'scripts/**'
            shell:
              - 'scripts/**'
              - 'tests/**'

  shell-test:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run regression tests
        run: bash tests/run-backup-regression.sh

  docker-validate:
    needs: changes
    if: needs.changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build validation image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: gh-backup:test
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

      - name: Validate container runtime
        run: |
          docker run --rm \
            -e GITHUB_OWNER=example-user \
            -e GITHUB_TOKEN=placeholder-token \
            -e BACKUP_CRON='17 2 * * *' \
            gh-backup:test validate

  publish:
    needs:
      - changes
      - shell-test
      - docker-validate
    if: >-
      github.event_name == 'push' &&
      needs.changes.outputs.image == 'true' &&
      (needs.shell-test.result == 'success' || needs.shell-test.result == 'skipped') &&
      needs.docker-validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          flavor: |
            latest=auto
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
