name: docker-image

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "gh_backup/**"
      - "scripts/**"
      - "tests/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "gh_backup/**"
      - "scripts/**"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run unit and regression tests
        run: bash scripts/check.sh

  docker-validate:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build validation image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: gh-backup:test
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

      - name: Validate container runtime
        run: |
          docker run --rm \
            -e GITHUB_OWNER=example-user \
            -e GITHUB_TOKEN=placeholder-token \
            -e BACKUP_CRON='17 2 * * *' \
            gh-backup:test validate

      - name: Verify non-root runtime and required tools
        run: |
          test "$(docker run --rm --entrypoint id gh-backup:test -u)" = "10001"
          docker run --rm --entrypoint sh gh-backup:test -c \
            'for tool in ghorg github-backup git git-lfs restic supercronic flock python3; do command -v "$tool" >/dev/null; done'

      - name: Scan image for fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: gh-backup:test
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

  publish:
    needs:
      - test
      - docker-validate
    if: >-
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      needs.docker-validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          flavor: |
            latest=auto
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

      - name: Attest published image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
