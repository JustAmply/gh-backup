services:
  gh-backup:
    build:
      context: .
    image: ghcr.io/justamply/gh-backup:latest
    restart: unless-stopped
    environment:
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_ORGS: ${GITHUB_ORGS:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_TOKEN_FILE: ${GITHUB_TOKEN_FILE:-}
      BACKUP_CRON: ${BACKUP_CRON:-17 2 * * *}
      BACKUP_DATA_DIR: ${BACKUP_DATA_DIR:-/data}
      TZ: ${TZ:-Europe/Berlin}
      RUN_ON_STARTUP: ${RUN_ON_STARTUP:-true}
      GHORG_INCLUDE_SUBMODULES: ${GHORG_INCLUDE_SUBMODULES:-true}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-26}
      BACKUP_MIN_FREE_GB: ${BACKUP_MIN_FREE_GB:-1}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD_FILE: ${RESTIC_PASSWORD_FILE:-}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-5}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-12}
    volumes:
      - gh_backup_data:${BACKUP_DATA_DIR:-/data}

volumes:
  gh_backup_data:
